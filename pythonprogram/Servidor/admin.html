<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel de Administración</title>

<link rel="stylesheet" href="/css/estilo.css">

<style>

h2{
margin-top:40px;
}

form{
background:white;
padding:20px;
display:inline-block;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
border:none;
border-radius:4px;
}

.crear{
background-color:#4CAF50;
color:white;
}

.editar{
background-color:#2196F3;
color:white;
}

.eliminar{
background-color:#f44336;
color:white;
}

table{
margin:40px auto;
border-collapse:collapse;
background:white;
}

th, td{
padding:10px 20px;
border:1px solid #ccc;
}

th{
background:#333;
color:white;
}

</style>

</head>

<body>

<h1>Panel de Administración</h1>

<h2>Agregar usuario</h2>

<form id="crearUsuarioForm">

<label>Usuario</label><br>
<input type="text" id="username" required><br>

<label>Programa académico</label><br>
<input type="text" id="programa" required><br>

<label>Contraseña</label><br>
<input type="password" id="password" required><br>

<input type="hidden" id="rol" value="user">

<br>
<button class="crear" type="submit">Crear usuario</button>

</form>

<p id="resultado"></p>

<h2>Usuarios registrados</h2>

<table>

<thead>

<tr>
<th>Usuario</th>
<th>Programa</th>
<th>Rol</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

<script>

async function cargarUsuarios(){

const respuesta = await fetch("/usuarios")

const usuarios = await respuesta.json()

const tabla = document.getElementById("tablaUsuarios")

tabla.innerHTML = ""

for(const nombre in usuarios){

const u = usuarios[nombre]

tabla.innerHTML += `
<tr>
<td>${nombre}</td>
<td>${u.programa}</td>
<td>${u.rol}</td>
<td>
<button class="editar" onclick="editarUsuario('${nombre}')">Editar</button>
<button class="eliminar" onclick="eliminarUsuario('${nombre}')">Eliminar</button>
</td>
</tr>
`

}

}

document.getElementById("crearUsuarioForm").addEventListener("submit", async function(e){

e.preventDefault()

const usuario = document.getElementById("username").value
const programa = document.getElementById("programa").value
const password = document.getElementById("password").value
const rol = document.getElementById("rol").value

const respuesta = await fetch("/crear_usuario",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:usuario,
password:password,
programa:programa,
rol:rol

})

})

const texto = await respuesta.text()

document.getElementById("resultado").innerText = texto

document.getElementById("crearUsuarioForm").reset()

cargarUsuarios()

})

async function eliminarUsuario(usuario){

if(!confirm("Eliminar usuario "+usuario+" ?")) return

await fetch("/eliminar_usuario",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:usuario
})

})

cargarUsuarios()

}

async function editarUsuario(usuario){

const nuevoPrograma = prompt("Nuevo programa académico:")

if(!nuevoPrograma) return

await fetch("/editar_usuario",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:usuario,
programa:nuevoPrograma
})

})

cargarUsuarios()

}

cargarUsuarios()

</script>

</body>
</html>
