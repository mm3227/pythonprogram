<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Gestión de Salones</title>

<link rel="stylesheet" href="/css/estiloadmin.css">
<link rel="stylesheet" href="/css/salones.css">
<link rel="icon" href="/multimedia/favicon-16x16.png">

<script src="/js/salones.js" defer></script>

</head>

<body>

<img class="banner" src="/multimedia/banner.jpg">

<div style="position:absolute; top:20px; left:20px;">
<button onclick="volver()">⬅ Volver</button>
</div>

<div style="position:absolute; top:20px; right:20px;">
<button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
</div>

<h1>Gestión de Salones</h1>
<h2>Salones registrados</h2>

<hr>

<h3>Buscar salón</h3>

<input
type="text"
id="buscadorSalones"
placeholder="Buscar salón o edificio"
onkeyup="buscarSalon()"
>

<hr>

<table id="tablaSalones" class="tabla-salones">

<thead>

<tr>
<th>programa</th>
<th>Edificio</th>
<th>Salón</th>
<th>Capacidad</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<hr>

<h3>Nuevo salón</h3>
<form id="formSalon">

<label>Programa</label>
<input type="text" id="programa" list="listaProgramas">
<datalist id="listaProgramas"></datalist>
<br><br>

<label>Edificio</label>

<input
type="text"
id="edificio"
>

<br><br>

<label>Salón</label>

<input
type="text"
id="salon"
>

<br><br>

<label>Capacidad</label>

<input
type="number"
id="capacidad"
>

<br><br>

<button
type="button"
onclick="agregarSalon()"
>

Guardar

</button>

</form>

<hr>

<h3>Importar Excel</h3>

<input
type="file"
id="archivoExcel"
accept=".xlsx"
>

<button onclick="importarExcel()">
📂Importar
</button>

<h2>Formato requerido para importar materias</h2>

<table class="tabla-ejemplo">

<tr>
<th>programa</th>
<th>Edificio</th>
<th>Salón</th>
<th>Capacidad</th>
</tr>

<tbody>

<tr>
<td>Ingeniería</td>
<td>E12</td>
<td>01</td>
<td>40</td>
</tr>

<tr>
<td>Robótica</td>
<td>E17B</td>
<td>11</td>
<td>35</td>
</tr>


</tbody>

</table>




</body>

</html>
