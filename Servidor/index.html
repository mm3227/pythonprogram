<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Horarios</title>
    <link rel="stylesheet" href="css/estilo.css"/>
    <link rel="icon" type="image/png" sizes="16x16" href="multimedia/favicon-16x16.png">
</head>

<body>

    <img src="multimedia/logo.jpg" alt="Logo UAZ" style="width:400px;">

    <h1>Gestor de Horarios</h1>
    <h2>Inicio de sesión</h2>

    <!-- MENSAJE DE ERROR -->
    <p id="error" style="color:red; font-weight:bold;"></p>

    <form action="/login" method="POST">
    
        <label>Usuario</label>
        <input type="text" name="usuario" required>
        <br><br>
    
        <label>Contraseña</label>
        <input type="password" name="password" required>
        <br><br>

        <button type="submit">Entrar</button>

    </form>

<script>

const parametros = new URLSearchParams(window.location.search);

if (parametros.get("error") === "1") {
    document.getElementById("error").innerText =
        "Usuario o contraseña incorrectos";
}

</script>

</body>
</html>
