<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Gestión de Materias</title>

<link rel="stylesheet" href="/css/estiloadmin.css">
<link rel="stylesheet" href="/css/materias.css">
<link rel="icon" href="/multimedia/favicon-16x16.png">

</head>

<body>

<img class="banner" src="/multimedia/banner.jpg">

<div style="position:absolute; top:20px; left:20px;">
<button onclick="volver()">⬅ Volver</button>
</div>

<div style="position:absolute; top:20px; right:20px;">
<button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
</div>

<h1>Gestión de Materias</h1>

<h2>Materias registradas</h2>

<input type="text" id="buscadorMaterias" placeholder="Buscar materia" onkeyup="buscarMateria()">

<div id="resultadoBusqueda"></div>

<table class="tabla-materias" id="tablaMaterias">

<thead>

<tr>
<th>Materia</th>
<th>Continuidad</th>
<th>Créditos</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<br>

<h2>Agregar / Editar Materia</h2>

<input type="text" id="materia" placeholder="Materia">
<input type="text" id="continuidad" placeholder="Continuidad">
<input type="number" id="creditos" placeholder="Créditos">

<br><br>

<button onclick="agregarMateria()">Guardar</button>

<br><br>

<h2>Importar desde Excel</h2>

<input type="file" id="archivoExcel" accept=".xlsx">
<button onclick="importarExcel()">📂 Importar</button>

<br><br>

<h2>Formato requerido para importar materias</h2>

<table class="tabla-ejemplo">

<tr>
<th>Materia</th>
<th>Continuidad</th>
<th>Créditos</th>
</tr>

<tbody>

<tr>
<td>CALCULO INTEGRAL</td>
<td>SI</td>
<td>5</td>
</tr>

<tr>
<td>CALCULO DIFERENCIAL</td>
<td>NO</td>
<td>5</td>
</tr>

</tbody>

</table>

<script src="/js/user_materias.js"></script>

</body>
</html>
